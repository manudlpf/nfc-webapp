
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Paramétrage NFC Device</title>
</head>
<body>
  <h2>Configurer le device NFC</h2>

  <form id="nfcForm">
    <label for="temporisation">Temporisation (ms):</label>
    <input type="number" id="temporisation" name="temporisation" required><br><br>

    <label for="sensibilite">Sensibilité (%):</label>
    <input type="number" id="sensibilite" name="sensibilite" required><br><br>

   <button type="button" onclick="writeParamsToTag()">Écrire sur le tag NFC</button>
    <button type="button" onclick="readFromTag()">Lire les paramètres</button>
  </form>

  <pre id="output"></pre>

  <script>
   
async function writeParamsToTag() {
  const output = document.getElementById("output");

  try {
    const temporisation = Number(
      document.getElementById("temporisation").value
    );
    const sensibilite = Number(
      document.getElementById("sensibilite").value
    );

    if (isNaN(temporisation) || isNaN(sensibilite)) {
      output.textContent = "Valeurs invalides.";
      return;
    }

    const payload = JSON.stringify({
      temporisation,
      sensibilite
    });

    const encoder = new TextEncoder();
    const data = encoder.encode(payload); // ✅ Uint8Array

    const ndef = new NDEFReader();
    await ndef.write({
      records: [{
        recordType: "mime",
        mediaType: "application/json",
        data: data
      }]
    });

    output.textContent = "Paramètres écrits dans le tag NFC.";

  } catch (error) {
    output.textContent = "Erreur NFC : " + error;
  }
}


    async function readFromTag() {
      try {
        const ndef = new NDEFReader();
        await ndef.scan();
        ndef.onreading = event => {
          const decoder = new TextDecoder();
          for (const record of event.message.records) {
            if (record.mediaType === "application/json") {
              const json = JSON.parse(decoder.decode(record.data));
              document.getElementById("output").textContent = JSON.stringify(json, null, 2);
            }
          }
        };
      } catch (error) {
        document.getElementById("output").textContent = "Erreur : " + error;
      }
    }
  </script>
</body>
</html>
